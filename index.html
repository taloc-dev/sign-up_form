<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="visual-section">
        <div class="logo-container">
            <img class="logo-img" src="images/odin-lined.png" alt="The Odin project logo">
            <span class="logo-txt">YU WEI</span>
        </div>
        <span class="photo-credit">Photo by
            <a href="https://unsplash.com/es/@hktram0311?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Hanvin Cheong</a> on 
            <a href="https://unsplash.com/es/fotos/un-hombre-parado-frente-a-un-edificio-por-la-noche-EfLy5-QAb9s?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
        </span>
    </div>
    <div class="form-section">

        <div class="service-desc">
            <p>This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. <br> Sing up <i>now</i> to get started.</p>
            <p>You <i>know</i> you want to.</p>
        </div>

        <form action="" method="post">
            <fieldset>
                <legend>Let's do this</legend>

                <div class="form-field">
                    <label for="first-name">FIRST NAME</label>
                    <input id="first-name" name="first-name" type="text" required>
                </div>
                <div class="form-field">
                    <label for="second-name">SECOND NAME</label>
                    <input id="second-name" name="second-name" type="text" required>
                </div>
                <div class="form-field">
                    <label for="email">EMAIL</label>
                    <input id="email" name="mail" type="email" required>
                </div>
                <div class="form-field">
                    <label for="phone-num">PHONE NUMBER</label>
                    <input id="phone-num" name="phone-number" type="tel" required>
                </div>
                <div class="form-field">
                    <label for="pass">PASSWORD</label>
                    <input id="pass" name="pass" type="password" required>
                </div>
                <div class="form-field">
                    <label for="confim-pass">CONFIRM PASSWORD</label>
                    <input id="confirm-pass" name="confim-pass" type="password" required>
                </div>
            </fieldset>

            <button type="submit">Create Account</button>
        </form>

        <span class="log-in-opt">Already have an account? <a href="">Log in</a></span>
    </div>
</body>
</html>
